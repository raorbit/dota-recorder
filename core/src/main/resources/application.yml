server:
  # REST + WebSocket bridge the Electron shell talks to. Loopback-only: binding
  # to 127.0.0.1 (never 0.0.0.0) keeps the service off the LAN and avoids the
  # Windows Defender Firewall "Allow access?" prompt entirely.
  port: 3224
  address: 127.0.0.1

spring:
  application:
    name: dota-recorder-core
  # Launch-once, long-lived sidecar (one Dota session = one launch). Lazy init
  # roughly halves cold-start with no downside for this usage pattern.
  main:
    lazy-initialization: true

app:
  # Second Tomcat connector dedicated to Dota GSI POSTs (see GsiConnectorConfig),
  # also bound to 127.0.0.1 only.
  gsi:
    port: 3223
  # Empty -> AppPaths resolves the default %APPDATA%/dota-recorder location.
  # Override only for tests or non-standard installs.
  data-dir: ""
  # Bundled OBS auto-configuration (Recording engine — bundle + auto-configure OBS).
  obs:
    # Writable OBS install root. Empty -> AppPaths uses %LOCALAPPDATA%/dota-recorder/obs.
    # Electron passes the same path it launches obs64.exe from.
    dir: ""
    # Read-only bundled OBS (electron-builder ships it to <resourcesPath>/obs). Empty ->
    # no first-run copy (dev / tests); config is still written into `dir`.
    source-dir: ""
    # Shipped OBS version, used as the first-run copy stamp so a version bump re-copies.
    # Default keeps dev / tests from copying; Electron passes the real bundled version.
    version: "0"

# Findable, rolling core log next to the data dir (matches AppPaths.logDir()).
# Spring Boot auto-configures a rolling file appender when logging.file.name is set,
# alongside the console. APPDATA is always set on Windows (the only target); the
# user.home fallback keeps tests/non-standard envs from failing to resolve a path.
logging:
  file:
    name: ${APPDATA:${user.home}}/dota-recorder/log/core.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
  level:
    root: INFO
