# electron-builder configuration for the packaged Windows installer.
#
# Plan / Step 0-1 foundation (design_handoff_dota2_recorder/README.md - Stack):
#   - Electron + React UI shell supervises a bundled Spring Boot JVM core.
#   - In a packaged build the supervisor runs:
#       <resourcesPath>/jre/bin/javaw.exe -jar <resourcesPath>/core/core.jar
#     so both the runnable jar and a trimmed JRE image are shipped via extraResources.
#
# NOTE: core.jar and jre-image are produced by the SEPARATE core/ Gradle build
# (bootJar + a jlink/jpackage runtime image task). They are referenced here by their
# expected output paths; this UI build does not produce them.
#
# Code signing is intentionally deferred for the personal/local build: an unsigned
# installer trips Microsoft Defender SmartScreen ("Unknown publisher") on first run,
# which is an accepted one-time click-through for personal use. Add `win.certificateFile`
# / `win.signtoolOptions` later if distribution warrants it.
appId: dev.dotarec.recorder
productName: Dota 2 Recorder
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build-resources

# Renderer bundle (Vite) + compiled Electron main/preload output. These globs are
# relative to the app/ directory: app/package.json makes app/ the electron-builder
# appDir (two-package layout), so paths must NOT be prefixed with app/.
files:
  - dist/**/*
  - electron-dist/**/*
  - package.json

# Shipped alongside the app, addressable at runtime via process.resourcesPath.
# These come from the core/ Gradle build (see note above). NOTE: extraResources
# `from` is resolved relative to the PROJECT ROOT (dota-recorder/), NOT the appDir
# — verified empirically: a ../core prefix resolved one level too high. So the
# core/ outputs at the repo root are referenced WITHOUT any prefix.
extraResources:
  - from: core/build/libs/core.jar
    to: core/core.jar
  - from: core/build/jre-image
    to: jre
  # Portable OBS fetched at build time by scripts/fetch-obs.mjs (npm run fetch:obs,
  # chained into dist). At first run the core copies it to a writable per-user dir,
  # auto-configures it, and drives it over obs-websocket — the user installs nothing.
  #
  # The packaged layout MUST mirror the dev tree (build-resources/obs/) so paths.ts
  # resolves it the same way in both modes: keep the binaries under an obs-portable/
  # subdir, and ship the `.obs-<version>.ok` version marker that fetch-obs writes as a
  # SIBLING of obs-portable. A flat `to: obs` would drop the subdir AND leave the marker
  # behind — then obsSourceDir() points one level too deep and obsVersion() always reads
  # "0", so the packaged build silently skips the first-run copy and never launches OBS.
  - from: build-resources/obs/obs-portable
    to: obs/obs-portable
  - from: build-resources/obs
    to: obs
    filter:
      - ".obs-*.ok"
  # Static ffmpeg.exe fetched at build time by scripts/fetch-ffmpeg.mjs (npm run
  # fetch:ffmpeg, chained into dist). The Electron supervisor threads this path into
  # the core (app.ffmpeg.path / DOTAREC_FFMPEG_PATH) so the core never depends on
  # ffmpeg being on the user's PATH. paths.ts ffmpegPath() resolves it here in a
  # packaged build and from build-resources/ffmpeg/ffmpeg.exe in dev — keep the
  # packaged layout mirroring the dev tree. The `.ffmpeg-<version>.ok` version marker
  # that fetch-ffmpeg writes as a SIBLING of ffmpeg/ is shipped via the filter below.
  - from: build-resources/ffmpeg/ffmpeg.exe
    to: ffmpeg/ffmpeg.exe
  - from: build-resources
    to: .
    filter:
      - ".ffmpeg-*.ok"

# koffi (optional native FFI for the Job Object) must stay outside the asar so its
# .node binary is loadable. In koffi 3.x the native binary no longer lives under
# koffi/ — it ships in a scoped per-platform package the loader resolves as
# @koromix/koffi-<platform>-<arch>/<triplet>/koffi.node (e.g. @koromix/koffi-win32-x64/
# win32_x64/koffi.node). BOTH must be unpacked: an asar-trapped .node can't be dlopen'd,
# so the packaged build would silently fall back to taskkill /T /F. Harmless when koffi
# isn't installed (nothing matches).
asarUnpack:
  - "**/node_modules/koffi/**"
  - "**/node_modules/@koromix/**"

win:
  # Brand red-diamond icon (multi-size .ico) for the exe, taskbar, and installer.
  # Regenerate with `node scripts/gen-icon.mjs` if the brand changes.
  icon: build-resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-Setup-${version}.${ext}
  # Custom install/uninstall hooks (project-root-relative; the default build/installer.nsh
  # would miss our build-resources/ buildResources dir). Adds an elevated Windows Firewall
  # rule scoping the managed OBS websocket port (4466) to loopback — issue #14.
  include: build-resources/installer.nsh
